name: 4 – Plate Discipline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Data scope: "game" (single game) or "dates" (date range)'
        required: true
        default: 'game'
        type: choice
        options:
          - game
          - dates
      batter_id:
        description: 'Batter ID (matchup.batter.id)'
        required: true
        default: '698945'
      game_pk:
        description: 'Game ID – required when mode is "game", ignored otherwise'
        required: false
        default: ''
      start_date:
        description: 'Start date YYYY-MM-DD – required when mode is "dates"'
        required: false
        default: ''
      end_date:
        description: 'End date YYYY-MM-DD – required when mode is "dates"'
        required: false
        default: ''
      season:
        description: 'Season year – required when mode is "dates"'
        required: false
        default: '2025'

concurrency:
  group: plate-discipline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plate-discipline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-plate-discipline-v1
          restore-keys: ${{ runner.os }}-r-plate-discipline-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e "
            pkgs <- c('baseballr', 'tidyverse')
            missing <- pkgs[!pkgs %in% rownames(installed.packages())]
            if (length(missing)) install.packages(missing)
          "

      - name: Run plate_discipline.R
        env:
          MODE:       ${{ inputs.mode }}
          BATTER_ID:  ${{ inputs.batter_id }}
          GAME_PK:    ${{ inputs.game_pk }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE:   ${{ inputs.end_date }}
          SEASON:     ${{ inputs.season }}
        run: Rscript .github/scripts/run_plate_discipline.R

      - name: Upload plate discipline CSV
        uses: actions/upload-artifact@v4
        with:
          name: plate-discipline-${{ inputs.batter_id }}-${{ inputs.mode }}
          path: "*.csv"
          if-no-files-found: error
